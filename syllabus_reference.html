<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Catalog | System Design 60</title>
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --border-card: #cbd5e1;
            --shadow: rgba(0, 0, 0, 0.05);
            --lld-border: #16a34a;
            --hld-border: #2563eb;
            --must-bg: #fee2e2;
            --med-bg: #fef3c7;
            --low-bg: #f1f5f9;
        }

        [data-theme="dark"] {
            --bg-body: #0b0f1a;
            --bg-header: #161b22;
            --bg-card: #161b22;
            --text-main: #c9d1d9;
            --text-secondary: #8b949e;
            --border-card: #30363d;
            --shadow: rgba(0, 0, 0, 0.3);
            --must-bg: rgba(248, 81, 73, 0.15);
            --med-bg: rgba(210, 153, 34, 0.15);
            --low-bg: rgba(139, 148, 158, 0.15);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); padding: 20px; color: var(--text-main); transition: 0.3s; }
        
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            border: 1px solid var(--border-card);
            background: var(--bg-header);
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header { 
            background: var(--bg-header); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 2px 10px var(--shadow); 
            margin-bottom: 25px; 
            position: sticky; 
            top: 10px; 
            z-index: 100;
            border: 1px solid var(--border-card);
        }

        .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        input, select { 
            padding: 10px; 
            border: 1px solid var(--border-card); 
            border-radius: 6px; 
            background: var(--bg-body);
            color: var(--text-main);
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { 
            background: var(--bg-card); 
            padding: 18px; 
            border-radius: 10px; 
            border-top: 5px solid var(--border-card); 
            box-shadow: 0 4px 6px var(--shadow);
            transition: 0.2s;
        }
        .card:hover { transform: translateY(-4px); }
        .card.lld { border-top-color: var(--lld-border); }
        .card.hld { border-top-color: var(--hld-border); }
        
        .prio-tag { font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; }
        .must { background: var(--must-bg); color: #f85149; }
        .medium { background: var(--med-bg); color: #d29922; }
        .low { background: var(--low-bg); color: var(--text-secondary); }
        
        .lec-pill { font-size: 11px; color: var(--accent); background: rgba(88, 166, 255, 0.1); padding: 2px 6px; border-radius: 4px; margin-bottom: 8px; display: inline-block; }
        .topic { font-weight: bold; font-size: 1.1em; margin-bottom: 10px; display: block; }
        .todo { font-size: 13px; color: var(--text-secondary); border-top: 1px solid var(--border-card); margin-top: 12px; padding-top: 12px; }
    </style>
</head>
<body>

<div class="nav-bar">

function render(items) {
    const container = document.getElementById('container');
    container.innerHTML = '';
    items.forEach(item => {
        const card = document.createElement('div');
        card.className = `card ${item.s}`;
        card.innerHTML = `
            <span class="lec-pill">Lec ${item.l} • ${item.time}</span>
            <span class="topic">${item.t}</span>
            <span class="prio-tag ${item.p}">${item.p === 'must' ? '🔥 Must' : item.p}</span>
            <div class="todo"><strong>Task:</strong> ${item.d}</div>
        `;
        container.appendChild(card);
    });
}

function filter() {
    const search = document.getElementById('search').value.toLowerCase();
    const prio = document.getElementById('filterPrio').value;
    const sec = document.getElementById('filterSec').value;
    
    const filtered = data.filter(i => {
        const matchSearch = i.t.toLowerCase().includes(search) || i.l.toString() === search;
        const matchPrio = prio === 'all' || i.p === prio;
        const matchSec = sec === 'all' || i.s === sec;
        return matchSearch && matchPrio && matchSec;
    });
    render(filtered);
}

// THEME SYNC LOGIC
const themeBtn = document.getElementById('themeBtn');

function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
}

// Initial Load Theme
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);

themeBtn.addEventListener('click', toggleTheme);
