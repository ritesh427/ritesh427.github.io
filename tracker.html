<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>60-Day SD Tracker | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --border-card: #cbd5e1;
            --shadow: rgba(0, 0, 0, 0.05);
            --accent: #2563eb;
            --success: #16a34a;
            --must: #ef4444; 
            --medium: #f59e0b; 
            --low: #94a3b8;
        }

        [data-theme="dark"] {
            --bg-body: #0b0f1a;
            --bg-header: #161b22;
            --bg-card: #161b22;
            --text-main: #c9d1d9;
            --text-secondary: #8b949e;
            --border-card: #30363d;
            --shadow: rgba(0, 0, 0, 0.3);
            --accent: #58a6ff;
            --success: #238636;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1300px; margin: 0 auto; }

        .top-nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            border: 1px solid var(--border-card);
            background: var(--bg-header);
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn:hover { border-color: var(--accent); }

        .dashboard-header {
            background: var(--bg-header); border: 1px solid var(--border-card);
            padding: 20px; border-radius: 12px; margin-bottom: 25px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 10px; z-index: 1000;
            box-shadow: 0 4px 10px var(--shadow);
        }

        .search-box { background: var(--bg-body); border: 1px solid var(--border-card); padding: 10px; border-radius: 6px; color: var(--text-main); width: 220px; }
        
        .prog-radial {
            width: 75px; height: 75px; border-radius: 50%;
            background: conic-gradient(var(--success) 0%, var(--border-card) 0%);
            display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--border-card);
        }

        .phase-box { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        h2 { color: var(--accent); font-size: 1.1rem; border-bottom: 1px solid var(--border-card); padding-bottom: 10px; margin-top: 0; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 11px; color: var(--text-secondary); padding: 12px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border-card); font-size: 14px; }

        .lec-pill { background: var(--bg-body); padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border-card); font-family: monospace; font-size: 12px; color: var(--accent); }
        .prio-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .prio-must { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid #f85149; }
        .prio-medium { background: rgba(210, 153, 34, 0.15); color: #d29922; border: 1px solid #d29922; }
        .prio-low { background: rgba(139, 148, 158, 0.15); color: var(--text-secondary); border: 1px solid var(--text-secondary); }

        .row-done { opacity: 0.25; filter: grayscale(1); transition: 0.3s; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--success); }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="syllabus_reference.html" class="btn">📖 Syllabus Reference</a>
    <button class="btn" id="themeBtn">🌙 Toggle Mode</button>

function getTargetDate(dayNum) {
    const start = new Date('2026-04-01');
    const actualDay = parseInt(dayNum.toString().split('-')[0]);
    start.setDate(start.getDate() + (actualDay - 1));
    return start.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

function render() {
    const main = document.getElementById('main-content');
    main.innerHTML = '';
    roadmapData.forEach((phase, pIdx) => {
        const section = document.createElement('div');
        section.className = 'phase-box';
        section.innerHTML = `<h2>${phase.phase}</h2>
            <table>
                <thead><tr><th>✔</th><th>Day</th><th>Lec #</th><th>Topic</th><th>Priority</th><th>Time</th><th>Practice Task</th></tr></thead>
                <tbody></tbody>
            </table>`;
        const tbody = section.querySelector('tbody');
        
        phase.days.forEach((item, iIdx) => {
            const id = `check-${pIdx}-${iIdx}`;
            const done = localStorage.getItem(id) === 'true';
            const meta = masterData[item.l] || {p:"low", t:"30 min"};
            
            const tr = document.createElement('tr');
            tr.id = `row-${id}`;
            if(done) tr.className = 'row-done';
            
            tr.innerHTML = `
                <td><input type="checkbox" id="${id}" ${done ? 'checked' : ''} onchange="toggle('${id}', '${meta.p}')"></td>
                <td><b>Day ${item.d}</b><br><small style="color:var(--text-secondary)">${getTargetDate(item.d)}</small></td>
                <td><span class="lec-pill">${item.l === 'Rev' ? 'REV' : 'Lec ' + item.l}</span></td>
                <td><strong>${item.t}</strong></td>
                <td><span class="prio-badge prio-${meta.p}">${meta.p}</span></td>
                <td style="color:var(--accent); font-weight:bold">${meta.t}</td>
                <td><small>${item.p}</small></td>
            `;
            tbody.appendChild(tr);
        });
        main.appendChild(section);
    });
    updateProgress();
}

function toggle(id, prio) {
    const checked = document.getElementById(id).checked;
    localStorage.setItem(id, checked);
    document.getElementById(`row-${id}`).classList.toggle('row-done', checked);
    if(checked && prio === 'must') confetti({ particleCount: 150, spread: 60, colors:['#f85149', '#58a6ff'] });
    updateProgress();
}

function updateProgress() {
    const total = document.querySelectorAll('input[type="checkbox"]').length;
    const done = document.querySelectorAll('input[type="checkbox"]:checked').length;
    const perc = Math.round((done/total)*100);
    const rad = document.getElementById('prog-text');
    rad.innerText = perc + '%';
    rad.style.background = `conic-gradient(var(--success) ${perc}%, var(--border-card) 0%)`;
}

function filter() {
    const q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('tr:not(thead tr)').forEach(tr => {
        tr.style.display = tr.innerText.toLowerCase().includes(q) ? "" : "none";
    });
}

// THEME TOGGLE LOGIC
const themeBtn = document.getElementById('themeBtn');
function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
}
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
themeBtn.addEventListener('click', toggleTheme);

function updateCountdown() {
    const diff = new Date('2026-04-01') - new Date();
    const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
    document.getElementById('countdown').innerText = days > 0 ? `🔥 Starts in ${days} days (April 1st)` : "🚀 CHALLENGE IN PROGRESS";
}

render();
updateCountdown();
</script>

</html>
